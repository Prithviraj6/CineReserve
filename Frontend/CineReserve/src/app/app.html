<div class="d-flex min-vh-100 bg-light position-relative">
  <!-- Sidebar (Hidden on Landing/Auth) -->
  <app-sidebar class="d-none d-md-block" *ngIf="!hideSidebar"></app-sidebar>

  <!-- Floating Toggle Button (Visible when sidebar is hidden) -->
  <button class="btn btn-white shadow-sm border rounded-3 floating-toggle" 
          *ngIf="(sidebarService.isCollapsed$ | async) && !hideSidebar"
          (click)="sidebarService.toggle()"
          title="Show Sidebar">
    <i class="bi bi-list fs-4"></i>
  </button>

  <!-- Main Content Area -->
  <div class="flex-grow-1 d-flex flex-column overflow-hidden" 
       [class.ps-sidebar]="!hideSidebar"
       [class.sidebar-hidden]="(sidebarService.isCollapsed$ | async) && !hideSidebar">
    <!-- Page Content -->
    <main class="flex-grow-1 overflow-auto">
      <router-outlet></router-outlet>
    </main>
    
    <!-- Footer -->
    <footer class="bg-white border-top py-4 text-center text-muted small" *ngIf="!hideSidebar">
      <div class="container">
        <p class="mb-1">&copy; 2026 CineReserve. All rights reserved.</p>
        <div class="d-flex justify-content-center gap-3">
          <a href="#" class="text-decoration-none text-muted">Privacy Policy</a>
          <a href="#" class="text-decoration-none text-muted">Terms of Service</a>
        </div>
      </div>
    </footer>
  </div>
</div>
