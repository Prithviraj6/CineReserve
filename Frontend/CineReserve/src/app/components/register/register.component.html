<div class="auth-container d-flex align-items-center justify-content-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card bg-white border-0 shadow-lg overflow-hidden animate-up">
          <div class="card-body p-5">
            <div class="text-center mb-5">
              <a routerLink="/" class="text-decoration-none h2 fw-bold text-primary mb-3 d-block">
                <i class="bi bi-ticket-perforated-fill me-2"></i>CineReserve
              </a>
              <h3 class="fw-bold">Create Account</h3>
              <p class="text-muted small">Join us and start booking your movie experiences</p>
            </div>
            
            <div *ngIf="error" class="alert alert-danger small border-0 py-2">{{ error }}</div>

            <form (ngSubmit)="onSubmit()">
              <div class="mb-3">
                <label class="form-label fw-medium small text-uppercase">Full Name</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                  <input type="text" class="form-control bg-light border-start-0" 
                         [(ngModel)]="fullName" name="fullName" required placeholder="John Doe">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-medium small text-uppercase">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                  <input type="email" class="form-control bg-light border-start-0" 
                         [(ngModel)]="email" name="email" required placeholder="name@example.com">
                </div>
              </div>
              
              <div class="mb-4">
                <label class="form-label fw-medium small text-uppercase">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                  <input [type]="showPassword ? 'text' : 'password'" class="form-control bg-light border-start-0 border-end-0" 
                         [(ngModel)]="password" name="password" required placeholder="Min 6 characters">
                  <button class="input-group-text bg-light border-start-0" type="button" (click)="showPassword = !showPassword">
                    <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                  </button>
                </div>
              </div>
              
              <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm mb-4" [disabled]="loading">
                {{ loading ? 'Creating Account...' : 'Sign Up' }}
              </button>

              <div class="text-center pt-3 border-top">
                <p class="mb-0 text-muted">Already have an account? 
                  <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Sign In</a>
                </p>
              </div>
            </form>
          </div>
        </div>
        <div class="text-center mt-4 animate-up-delay">
          <a routerLink="/" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
        </div>
      </div>
    </div>
  </div>
</div>
